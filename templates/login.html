<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH Sentinel — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',Arial,sans-serif;
         display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#161b22;border:1px solid #30363d;border-radius:12px;
          padding:40px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    .logo{text-align:center;margin-bottom:28px}
    .logo h1{font-size:22px;color:#58a6ff;letter-spacing:2px}
    .logo p{font-size:12px;color:#8b949e;margin-top:4px}
    label{display:block;font-size:13px;color:#8b949e;margin-bottom:6px}
    input[type=text],input[type=password]{
      width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;
      border-radius:6px;color:#c9d1d9;font-size:14px;outline:none;margin-bottom:16px}
    input:focus{border-color:#58a6ff}
    button{width:100%;padding:11px;background:#238636;border:none;border-radius:6px;
           color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
    button:hover{background:#2ea043}
    .error{background:#3d1f1f;border:1px solid #e74c3c;border-radius:6px;
           padding:10px 14px;color:#e74c3c;font-size:13px;margin-bottom:16px}
    .shield{font-size:48px;display:block;margin-bottom:8px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="shield">🛡️</span>
      <h1>SSH SENTINEL</h1>
      <p>Honeypot Dashboard</p>
    </div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" autocomplete="off">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" placeholder="admin" required autofocus>
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="••••••••" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
